<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#070A12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZEX" />
    <meta name="description" content="ZEX — Professional crypto trading terminal" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>ZEX by Zellular</title>
    <style>
      :root {
        --bg-base: #070A12;
        --bg-panel: #0C1120;
        --bg-card: #131A2B;
        --bg-hover: #1A2238;
        --accent: #16C784;
        --accent-bright: #1FE39A;
        --accent-dim: rgba(22,199,132,0.14);
        --danger: #F0616D;
        --danger-dim: rgba(240,97,109,0.14);
        --text-primary: #EAEEF7;
        --text-muted: #6B7494;
        --text-soft: #8C95B5;
        --border: #1A2238;
        --border-strong: #243049;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
      }
      input, select, textarea, button {
        font-family: inherit;
      }
      input::placeholder, textarea::placeholder {
        color: var(--text-muted);
      }
      ::selection {
        background: var(--accent-dim);
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
