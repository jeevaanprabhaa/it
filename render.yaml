services:
  - type: web
    name: zex-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PGSSLMODE
        value: require
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CRYPTOCOMPARE_API_KEY
        sync: false
